<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmação de Inscrição</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:40px;
    background: linear-gradient(135deg, #121212, #1e1428);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    box-sizing:border-box;
}

/* TOPBAR */

.topbar{
    position:fixed;
    top:20px;
    left:20px;
    right:20px;
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    z-index:999;
    pointer-events:none;
}

.topbar-esquerda,
.topbar-direita{
    display:flex;
    gap:10px;
    pointer-events:auto;
}

.topbar-direita{
    justify-content:flex-end;
}

.topbar-titulo{
    justify-self:center;
    background:#ffffffcc;
    padding:10px 18px;
    border-radius:10px;
    box-shadow:0 0 8px rgba(0,0,0,0.2);
    backdrop-filter:blur(5px);
    font-weight:bold;
}

.top-btn{
    background:#ffffffcc;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    box-shadow:0 0 8px rgba(0,0,0,0.2);
}

.top-btn:hover{
    background:#f0f0f0;
}

.gif-superior-direito{
    width:120px;
    height:120px;
    background-image:url("background.gif");
    background-size:contain;
    background-repeat:no-repeat;
    background-position:center;
}

/* CONTEÚDO */

.container{
    width:100%;
    max-width:600px;
    background:#fff;
    padding:32px;
    border-radius:16px;
    box-shadow:0 0 16px rgba(0,0,0,0.25);
    text-align:center;
    margin-top:80px;
}

h1{
    color:#2e7d32;
    margin-top:0;
}

p{
    color:#555;
    line-height:1.5;
}

.card-evento{
    margin-top:24px;
    background:#f9f9f9;
    border:1px solid #ddd;
    border-radius:12px;
    padding:20px;
    text-align:left;
}

.card-evento h2{
    margin-top:0;
    color:#333;
}

.botao{
    display:inline-block;
    margin-top:24px;
    padding:12px 20px;
    background:#333;
    color:#fff;
    text-decoration:none;
    border-radius:10px;
}

.botao:hover{
    opacity:0.9;
}

</style>
</head>

<body>

<div class="topbar">

<div class="topbar-esquerda">
<button class="top-btn" onclick="history.back()">⬅ Voltar</button>
<button class="top-btn" onclick="window.location.href='index.html'">🏠 Home</button>
<button class="top-btn" onclick="sair()">Sair</button>
</div>

<div class="topbar-titulo">Confirmação de Inscrição</div>

<div class="topbar-direita">
<div class="gif-superior-direito"></div>
</div>

</div>

<div class="container">

<h1>Inscrição realizada com sucesso!</h1>
<p>Seu cadastro no evento foi concluído. Confira os detalhes abaixo:</p>

<div class="card-evento" id="detalhesEvento"></div>

<a href="participante.html" class="botao">Voltar para eventos</a>

</div>

<script>

const evento = JSON.parse(localStorage.getItem("eventoConfirmado"));
const detalhes = document.getElementById("detalhesEvento");

if(evento){
    detalhes.innerHTML = `
        <h2>${evento.nome}</h2>
        <p><strong>Descrição:</strong> ${evento.descricao}</p>
        <p><strong>Data:</strong> ${evento.data}</p>
        <p><strong>Local:</strong> ${evento.local}</p>
    `;
}else{
    detalhes.innerHTML = "<p>Nenhum evento encontrado.</p>";
}

function sair(){
localStorage.removeItem("tipoUsuario");
window.location.href = "index.html";
}

</script>

</body>
</html>
