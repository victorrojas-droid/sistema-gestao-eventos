<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:40px;
    background: linear-gradient(135deg, #121212, #1e1428);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    box-sizing:border-box;
}

/* TOPBAR */

.topbar{
    position:fixed;
    top:20px;
    left:20px;
    right:20px;
    display:grid;
    grid-template-columns: 1fr auto 1fr;
    align-items:center;
    z-index:999;
    pointer-events:none;
}

.topbar-esquerda,
.topbar-direita{
    display:flex;
    gap:10px;
    pointer-events:auto;
}

.topbar-direita{
    justify-content:flex-end;
}

.topbar-titulo{
    justify-self:center;
    background:#ffffffcc;
    padding:10px 18px;
    border-radius:10px;
    box-shadow:0 0 8px rgba(0,0,0,0.2);
    backdrop-filter:blur(5px);
    font-weight:bold;
    color:#333;
}

.top-btn{
    background:#ffffffcc;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    box-shadow:0 0 8px rgba(0,0,0,0.2);
    backdrop-filter:blur(5px);
}

.top-btn:hover{
    background:#f0f0f0;
}

.gif-superior-direito{
    width:120px;
    height:120px;
    background-image:url("background.gif");
    background-size:contain;
    background-repeat:no-repeat;
    background-position:center;
}

/* LOGIN */

.container{
    width:100%;
    max-width:400px;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h1{
    margin-top:0;
    text-align:center;
}

.form-group{
    margin-bottom:16px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button.entrar{
    width:100%;
    padding:12px;
    background:#333;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
}

button.entrar:hover{
    opacity:0.9;
}

</style>
</head>

<body>

<div class="topbar">

<div class="topbar-esquerda">
<button class="top-btn" onclick="history.back()">⬅ Voltar</button>
<button class="top-btn" onclick="window.location.href='index.html'">🏠 Home</button>
</div>

<div class="topbar-titulo">Login</div>

<div class="topbar-direita">
<div class="gif-superior-direito"></div>
</div>

</div>

<div class="container">

<h1>Login</h1>

<div class="form-group">
<label>Email</label>
<input type="email" id="email">
</div>

<div class="form-group">
<label>Senha</label>
<input type="password" id="senha">
</div>

<button class="entrar" onclick="entrar()">Entrar</button>

</div>

<script>

function entrar(){

const email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;

if(!email || !senha){
alert("Preencha email e senha.");
return;
}

const tipo = localStorage.getItem("tipoUsuario");

if(tipo === "organizador"){
window.location.href = "organizador.html";
}

if(tipo === "participante"){
window.location.href = "participante.html";
}

}

</script>

</body>
</html>
