<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área do Organizador</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:40px;
    background: linear-gradient(135deg, #121212, #1e1428);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* TOPBAR */

.topbar{
    position:fixed;
    top:20px;
    left:20px;
    right:20px;
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    z-index:999;
    pointer-events:none;
}

.topbar-esquerda,
.topbar-direita{
    display:flex;
    gap:10px;
    pointer-events:auto;
}

.topbar-direita{
    justify-content:flex-end;
}

.topbar-titulo{
    justify-self:center;
    background:#ffffffcc;
    padding:10px 18px;
    border-radius:10px;
    box-shadow:0 0 8px rgba(0,0,0,0.2);
    backdrop-filter:blur(5px);
    font-weight:bold;
}

.top-btn{
    background:#ffffffcc;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    box-shadow:0 0 8px rgba(0,0,0,0.2);
}

.top-btn:hover{
    background:#f0f0f0;
}

.gif-superior-direito{
    width:120px;
    height:120px;
    background-image:url("background.gif");
    background-size:contain;
    background-repeat:no-repeat;
    background-position:center;
}

/* CONTAINER */

.container{
    width:100%;
    max-width:500px;
    background:#fff;
    padding:32px;
    border-radius:14px;
    box-shadow:0 0 15px rgba(0,0,0,0.25);
    text-align:center;
}

h1{
    margin-top:0;
}

p{
    color:#666;
}

.botao{
    width:100%;
    padding:14px;
    margin-top:14px;
    border:none;
    border-radius:10px;
    background:#333;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.botao:hover{
    opacity:0.9;
}

</style>
</head>

<body>

<div class="topbar">

<div class="topbar-esquerda">
<button class="top-btn" onclick="history.back()">⬅ Voltar</button>
<button class="top-btn" onclick="window.location.href='index.html'">🏠 Home</button>
<button class="top-btn" onclick="sair()">Sair</button>
</div>

<div class="topbar-titulo">Área do Organizador</div>

<div class="topbar-direita">
<div class="gif-superior-direito"></div>
</div>

</div>

<div class="container">

<h1>Painel do Organizador</h1>
<p>Escolha uma opção para gerenciar os eventos</p>

<button class="botao" onclick="window.location.href='cadastrar-evento.html'">
Cadastrar Evento
</button>

<button class="botao" onclick="window.location.href='eventos-cadastrados.html'">
Eventos Cadastrados
</button>

</div>

<script>

function sair(){
localStorage.removeItem("tipoUsuario");
window.location.href = "index.html";
}

</script>

</body>
</html>
