<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área do Participante</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:40px;
    background: linear-gradient(135deg, #121212, #1e1428);
}

/* TOPBAR */

.topbar{
    position:fixed;
    top:20px;
    left:20px;
    right:20px;
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    z-index:999;
    pointer-events:none;
}

.topbar-esquerda,
.topbar-direita{
    display:flex;
    gap:10px;
    pointer-events:auto;
}

.topbar-direita{
    justify-content:flex-end;
}

.topbar-titulo{
    justify-self:center;
    background:#ffffffcc;
    padding:10px 18px;
    border-radius:10px;
    box-shadow:0 0 8px rgba(0,0,0,0.2);
    backdrop-filter:blur(5px);
    font-weight:bold;
}

.top-btn{
    background:#ffffffcc;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    box-shadow:0 0 8px rgba(0,0,0,0.2);
}

.top-btn:hover{
    background:#f0f0f0;
}

.gif-superior-direito{
    width:120px;
    height:120px;
    background-image:url("background.gif");
    background-size:contain;
    background-repeat:no-repeat;
    background-position:center;
}

/* CONTEÚDO */

.container{
    max-width:800px;
    margin:80px auto 0;
    background:#fff;
    padding:24px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1,h2{
    color:#333;
    margin-top:0;
}

p{
    color:#666;
}

#listaEventos{
    margin-top:24px;
}

.evento{
    position:relative;
    background:#f9f9f9;
    border:1px solid #ddd;
    border-radius:10px;
    padding:14px;
    margin-top:12px;
}

.evento h3{
    margin-top:0;
}

.botao-inscrever{
    background:#4caf50;
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
    width:100%;
}

.botao-inscrever:hover{
    opacity:0.9;
}

.vazio{
    background:#f9f9f9;
    border:1px dashed #ccc;
    border-radius:10px;
    padding:14px;
    color:#777;
}

</style>
</head>

<body>

<div class="topbar">

<div class="topbar-esquerda">
<button class="top-btn" onclick="history.back()">⬅ Voltar</button>
<button class="top-btn" onclick="window.location.href='index.html'">🏠 Home</button>
<button class="top-btn" onclick="sair()">Sair</button>
</div>

<div class="topbar-titulo">Área do Participante</div>

<div class="topbar-direita">
<div class="gif-superior-direito"></div>
</div>

</div>

<div class="container">

<h1>Eventos Disponíveis</h1>
<p>Visualize os eventos e realize sua inscrição.</p>

<div id="listaEventos"></div>

</div>

<script>

let eventos = JSON.parse(localStorage.getItem("eventos")) || [];

function inscreverEvento(indice){
    const evento = eventos[indice];
    localStorage.setItem("eventoSelecionado", JSON.stringify(evento));
    window.location.href = "inscricao.html";
}

function mostrarEventos(){

const lista = document.getElementById("listaEventos");

if(eventos.length === 0){
    lista.className = "vazio";
    lista.innerHTML = "Nenhum evento disponível no momento.";
    return;
}

lista.className = "";

let conteudo = "";

for(let i = 0; i < eventos.length; i++){
    conteudo += `
    <div class="evento">
        <h3>${eventos[i].nome}</h3>
        <p><strong>Descrição:</strong> ${eventos[i].descricao}</p>
        <p><strong>Data:</strong> ${eventos[i].data}</p>
        <p><strong>Local:</strong> ${eventos[i].local}</p>
        <button class="botao-inscrever" onclick="inscreverEvento(${i})">
            Inscrever-se
        </button>
    </div>
    `;
}

lista.innerHTML = conteudo;

}

function sair(){
localStorage.removeItem("tipoUsuario");
window.location.href = "index.html";
}

mostrarEventos();

</script>

</body>
</html>
